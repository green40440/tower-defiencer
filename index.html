<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #1a202c; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #game-container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        canvas { box-shadow: 0 0 30px rgba(0,0,0,0.9); background-color: #2d3748; max-width: 100%; max-height: 100%; object-fit: contain; cursor: crosshair; }
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 1rem; box-sizing: border-box; }
        .interactive { pointer-events: auto; }
        .hidden { display: none !important; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.4); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #4a5568; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #718096; }

        .tower-btn.selected { border-color: #4299e1; background-color: rgba(66, 153, 225, 0.2); box-shadow: 0 0 15px rgba(66, 153, 225, 0.6); }
        .tower-btn.disabled { opacity: 0.4; filter: grayscale(100%); cursor: not-allowed; transform: none; border-color: transparent; }
    </style>
</head>

<div id="game-container">

class Vector2 {
    constructor(x=0, y=0) { this.x=x; this.y=y; }
    add(v) { return new Vector2(this.x+v.x, this.y+v.y); }
    sub(v) { return new Vector2(this.x-v.x, this.y-v.y); }
    mult(n) { return new Vector2(this.x*n, this.y*n); }
    mag() { return Math.sqrt(this.x*this.x + this.y*this.y); }
    normalize() { let m=this.mag(); return m===0 ? new Vector2() : new Vector2(this.x/m, this.y/m); }
    dist(v) { return Math.sqrt((this.x-v.x)**2 + (this.y-v.y)**2); }
    clone() { return new Vector2(this.x, this.y); }
}

class GameMap {
    constructor(cols, rows, size) {
        this.cols = cols; this.rows = rows; this.size = size;
        this.grid = Array(cols).fill().map(() => Array(rows).fill(0));
        this.pathPoints = [{x:-1,y:2},{x:4,y:2},{x:4,y:14},{x:9,y:14},{x:9,y:5},{x:15,y:5},{x:15,y:12},{x:21,y:12},{x:21,y:8},{x:26,y:8}];
        for (let i = 0; i < this.pathPoints.length - 1; i++) {
            let p1 = this.pathPoints[i], p2 = this.pathPoints[i+1];
            let dx = Math.sign(p2.x - p1.x), dy = Math.sign(p2.y - p1.y);
            let cx = p1.x, cy = p1.y;
            while (cx !== p2.x || cy !== p2.y) {
                if (cx >= 0 && cx < this.cols && cy >= 0 && cy < this.rows) this.grid[cx][cy] = 1;
                cx += dx; cy += dy;
            }
            if (p2.x >= 0 && p2.x < this.cols && p2.y >= 0 && p2.y < this.rows) this.grid[p2.x][p2.y] = 1;
        }
    }
    draw(ctx) {
        ctx.fillStyle = CONFIG.COLORS.bg; ctx.fillRect(0, 0, this.cols * this.size, this.rows * this.size);
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)'; ctx.lineWidth = 1;
        for(let i=0; i<=this.cols; i++) { ctx.beginPath(); ctx.moveTo(i*this.size, 0); ctx.lineTo(i*this.size, this.rows*this.size); ctx.stroke(); }
        for(let i=0; i<=this.rows; i++) { ctx.beginPath(); ctx.moveTo(0, i*this.size); ctx.lineTo(this.cols*this.size, i*this.size); ctx.stroke(); }
        
        ctx.shadowBlur = 10; ctx.shadowColor = '#4299e1'; ctx.fillStyle = CONFIG.COLORS.path;
        for (let x = 0; x < this.cols; x++) {
            for (let y = 0; y < this.rows; y++) {
                if (this.grid[x][y] === 1) {
                    ctx.fillRect(x * this.size, y * this.size, this.size, this.size);
                    ctx.fillStyle = 'rgba(66, 153, 225, 0.05)';
                    ctx.fillRect(x * this.size + 2, y * this.size + 2, this.size - 4, this.size - 4);
                    ctx.fillStyle = CONFIG.COLORS.path;
                }
            }
        }
        ctx.shadowBlur = 0;
        let pulse = (Math.sin(performance.now() / 200) + 1) / 2;
        ctx.fillStyle = `rgba(229, 62, 62, ${0.2 + pulse * 0.3})`; ctx.fillRect(0, this.pathPoints[1].y * this.size, this.size, this.size); 
        ctx.fillStyle = `rgba(56, 161, 105, ${0.2 + pulse * 0.3})`; ctx.fillRect((this.cols-1) * this.size, this.pathPoints[8].y * this.size, this.size, this.size);
    }

class Enemy {

        this.color = def.color; this.reward = def.reward; this.alpha = def.alpha || 1.0;
        this.immuneToSlow = def.immuneToSlow; this.isBoss = def.isBoss;
        this.waypoints = waypoints; this.targetIndex = 1; this.pos = waypoints[0].clone();
        this.slowTimer = 0; this.slowFactor = 1.0; this.poisonTimer = 0; this.poisonDps = 0;
        this.active = true; this.hitTimer = 0;
    }
    takeDamage(amt, sourcePos) {
        if (!this.active) return;
        this.hp -= amt; this.hitTimer = 0.1;
        game.particleSystem.addText(this.pos.x, this.pos.y - 15, Math.floor(amt), '#ff4444');
        if (sourcePos) for(let i=0; i<3; i++) game.particleSystem.addParticle(this.pos.x, this.pos.y, this.color, 150, 2);

    applyPoison(dps, dur) { if (dps > this.poisonDps || this.poisonTimer <= 0) { this.poisonDps = dps; this.poisonTimer = dur; } }
    die() {
        this.active = false; game.addMoney(this.reward); game.addScore(this.reward * 10);
        game.particleSystem.addText(this.pos.x, this.pos.y, `+$${this.reward}`, '#ffff00');
        for(let i=0; i<(this.isBoss?30:10); i++) game.particleSystem.addParticle(this.pos.x, this.pos.y, this.color, this.isBoss?200:100, this.isBoss?5:3);

    update(dt) {
        if (!this.active) return;

        if (this.slowTimer > 0 && (this.slowTimer -= dt) <= 0) { this.speed = this.baseSpeed; this.slowFactor = 1.0; }
        if (this.poisonTimer > 0 && (this.poisonTimer -= dt)) { this.hp -= this.poisonDps * dt; if(Math.random()<0.1) game.particleSystem.addParticle(this.pos.x, this.pos.y, '#48bb78', 50, 2); if(this.hp<=0) this.die(); }

    draw(ctx) {

        if (this.hitTimer > 0) { ctx.fillStyle = '#ffffff'; ctx.shadowBlur = 15; ctx.shadowColor = '#ffffff'; }

            grad.addColorStop(0, '#ffffff'); grad.addColorStop(0.3, this.color); grad.addColorStop(1, '#000000');

        if (this.isBoss) { ctx.beginPath(); ctx.arc(this.pos.x, this.pos.y, this.radius*0.4, 0, Math.PI*2); ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fill(); }
        if (this.slowTimer > 0) { ctx.beginPath(); ctx.arc(this.pos.x, this.pos.y, this.radius+3, 0, Math.PI*2); ctx.strokeStyle='rgba(99, 179, 237, 0.8)'; ctx.lineWidth=3; ctx.setLineDash([4,4]); ctx.stroke(); ctx.setLineDash([]); }

    }
}

class Projectile {
    constructor(tower, target) {
        this.pos = tower.pos.clone(); this.target = target; this.tower = tower; this.stats = tower.getStats();

    }
    update(dt) {

    }

        } else { ctx.beginPath(); ctx.arc(this.pos.x, this.pos.y, 4, 0, Math.PI*2); ctx.fillStyle = '#fff'; ctx.fill(); }
        ctx.shadowBlur = 0;
    }

class Tower {
    constructor(gx, gy, typeId) {
        this.gridX = gx; this.gridY = gy; this.type = typeId; this.def = TOWER_TYPES[typeId];
        this.pos = new Vector2(gx*CONFIG.GRID_SIZE + CONFIG.GRID_SIZE/2, gy*CONFIG.GRID_SIZE + CONFIG.GRID_SIZE/2);
        this.level = 0; this.cooldown = 0; this.angle = 0; this.target = null;
    }
    getStats() { return this.def.upgrades[this.level]; }
    canUpgrade() { return this.level < this.def.upgrades.length - 1; }
    getUpgradeCost() { return this.canUpgrade() ? this.def.upgrades[this.level + 1].cost : 0; }
    upgrade() { if (this.canUpgrade()) { this.level++; for(let i=0; i<20; i++) game.particleSystem.addParticle(this.pos.x, this.pos.y, '#ecc94b', 100, 3, 0.5); } }
    getSellValue() { let tot=this.def.baseCost; for(let i=1;i<=this.level;i++) tot+=this.def.upgrades[i].cost; return Math.floor(tot*0.6); }
    update(dt) {
        if (this.cooldown > 0) this.cooldown -= dt;
        let stats = this.getStats();
        if (!this.target || !this.target.active || this.pos.dist(this.target.pos) > stats.range) {
            this.target = null; let maxDist = -1;
            for (let e of game.enemies) {
                if (e.active && this.pos.dist(e.pos) <= stats.range) {
                    let traveled = e.targetIndex*1000 - e.pos.dist(e.waypoints[e.targetIndex]);
                    if (traveled > maxDist) { maxDist = traveled; this.target = e; }
                }
            }
        }
        if (this.target) {
            this.angle = Math.atan2(this.target.pos.y - this.pos.y, this.target.pos.x - this.pos.x);
            if (this.def.model === 'laser') this.target.takeDamage(stats.damage * dt, this.pos);
            else if (this.cooldown <= 0) {
                game.projectiles.push(new Projectile(this, this.target));
                let bx = this.pos.x + Math.cos(this.angle) * (CONFIG.GRID_SIZE/1.5), by = this.pos.y + Math.sin(this.angle) * (CONFIG.GRID_SIZE/1.5);
                game.particleSystem.addParticle(bx, by, '#fff', 30, 4, 0.15);
                this.cooldown = 1.0 / stats.fireRate;
            }
        }
    }
    draw(ctx) {
        let stats = this.getStats(), size = CONFIG.GRID_SIZE, half = size/2, time = performance.now();
        ctx.save(); ctx.translate(this.pos.x, this.pos.y);
        let baseGrad = ctx.createLinearGradient(-half, -half, half, half);
        baseGrad.addColorStop(0, '#4a5568'); baseGrad.addColorStop(1, '#1a202c');
        ctx.fillStyle = baseGrad; ctx.fillRect(-half+2, -half+2, size-4, size-4);
        ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(0, 0, half-4, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = stats.color; ctx.lineWidth = 2; ctx.shadowBlur = 10; ctx.shadowColor = stats.color;
        ctx.beginPath(); ctx.arc(0, 0, half-6, 0, Math.PI*2); ctx.stroke(); ctx.shadowBlur = 0;
        ctx.fillStyle = stats.color; ctx.shadowBlur = 5; ctx.shadowColor = stats.color;
        for(let i=0; i<=this.level; i++) { ctx.beginPath(); ctx.arc(-half+6+i*8, half-6, 2.5, 0, Math.PI*2); ctx.fill(); }
        ctx.shadowBlur = 0; ctx.rotate(this.angle);
        
        let metal = ctx.createLinearGradient(0, -6, 0, 6); metal.addColorStop(0, '#cbd5e0'); metal.addColorStop(0.5, '#718096'); metal.addColorStop(1, '#2d3748');
        let m = this.def.model;
        if (m === 'gun') { ctx.fillStyle = metal; ctx.fillRect(0, -4, 18, 8); ctx.fillStyle = stats.color; ctx.beginPath(); ctx.arc(0,0,10,0,Math.PI*2); ctx.fill(); ctx.fillStyle = '#2d3748'; ctx.beginPath(); ctx.arc(0,0,5,0,Math.PI*2); ctx.fill(); }
        else if (m === 'sniper') { ctx.fillStyle = metal; ctx.fillRect(0, -3, 26, 6); ctx.fillStyle = '#111'; ctx.fillRect(4, -5, 8, 3); ctx.fillStyle = stats.color; ctx.beginPath(); ctx.moveTo(8,0); ctx.lineTo(-8,8); ctx.lineTo(-8,-8); ctx.fill(); if (this.target && this.pos.dist(this.target.pos) <= stats.range) { ctx.strokeStyle = 'rgba(255,0,0,0.3)'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(26,0); ctx.lineTo(this.pos.dist(this.target.pos), 0); ctx.stroke(); } }
        else if (m === 'cannon') { ctx.strokeStyle = metal; ctx.lineWidth = 8; ctx.lineCap = 'round'; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(16,0); ctx.stroke(); ctx.lineCap = 'butt'; ctx.fillStyle = stats.color; ctx.beginPath(); ctx.arc(0,0,12,0,Math.PI*2); ctx.fill(); ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(0,0,6,0,Math.PI*2); ctx.fill(); }
        else if (m === 'ice') { ctx.fillStyle = '#ebf8ff'; ctx.shadowBlur = 10; ctx.shadowColor = stats.color; ctx.beginPath(); ctx.moveTo(14,0); ctx.lineTo(-6,10); ctx.lineTo(-6,-10); ctx.fill(); ctx.fillStyle = stats.color; ctx.beginPath(); ctx.arc(0,0,7,0,Math.PI*2); ctx.fill(); ctx.shadowBlur = 0; }
        else if (m === 'laser') { ctx.strokeStyle = metal; ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(0,-6); ctx.lineTo(14,-6); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0,6); ctx.lineTo(14,6); ctx.stroke(); let pulse = (Math.sin(time/150)+1)/2; ctx.fillStyle = stats.color; ctx.shadowBlur = 15+pulse*10; ctx.shadowColor = stats.color; ctx.beginPath(); ctx.arc(4,0,6+pulse*2,0,Math.PI*2); ctx.fill(); ctx.shadowBlur = 0; }
        else if (m === 'poison') { let throb = (Math.sin(time/200)+1)/2; ctx.fillStyle = '#276749'; ctx.beginPath(); ctx.arc(0,0,11,0,Math.PI*2); ctx.fill(); ctx.fillStyle = stats.color; ctx.beginPath(); ctx.arc(6,0,5+throb,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(0,6,4,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(0,-6,4,0,Math.PI*2); ctx.fill(); }
        ctx.restore();

            ctx.shadowBlur = 15; ctx.shadowColor = stats.color; ctx.strokeStyle = stats.color; ctx.lineWidth = 3+Math.random()*2; ctx.stroke();
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.stroke(); ctx.shadowBlur = 0;
            if(Math.random() > 0.4) game.particleSystem.addParticle(this.target.pos.x, this.target.pos.y, stats.color, 40, 2, 0.15);
        }
    }
}

class ParticleSystem {
    constructor() { this.particles = []; this.texts = []; }
    addParticle(x, y, color, speed, size, life = 0.5) { let a = Math.random()*Math.PI*2, v = Math.random()*speed; this.particles.push({pos: new Vector2(x,y), vel: new Vector2(Math.cos(a)*v, Math.sin(a)*v), color, size, life, maxLife: life}); }
    addExplosion(x, y, radius, color) { this.particles.push({pos: new Vector2(x,y), vel: new Vector2(0,0), color: '#fff', size: radius, life: 0.2, maxLife: 0.2, isFlash: true}); for(let i=0; i<15; i++) this.addParticle(x, y, color, 150, 4, 0.4); }
    addText(x, y, text, color) { this.texts.push({x, y, text, color, life: 1.0, maxLife: 1.0, vy: -20}); }
    update(dt) {
        for (let i = this.particles.length - 1; i >= 0; i--) { let p = this.particles[i]; if ((p.life -= dt) <= 0) this.particles.splice(i, 1); else { p.pos = p.pos.add(p.vel.mult(dt)); p.vel = p.vel.mult(0.95); } }
        for (let i = this.texts.length - 1; i >= 0; i--) { let t = this.texts[i]; if ((t.life -= dt) <= 0) this.texts.splice(i, 1); else t.y += t.vy * dt; }
    }
    draw(ctx) {
        ctx.globalCompositeOperation = 'lighter';
        for (let p of this.particles) {
            let alpha = Math.max(0, p.life / p.maxLife); ctx.globalAlpha = alpha; ctx.fillStyle = p.color;
            if (p.isFlash) { ctx.beginPath(); ctx.arc(p.pos.x, p.pos.y, p.size*(1-alpha), 0, Math.PI*2); ctx.fillStyle = `rgba(255,255,255,${alpha*0.5})`; ctx.fill(); ctx.strokeStyle = p.color; ctx.lineWidth = 3*alpha; ctx.stroke(); }
            else { ctx.shadowBlur = 10; ctx.shadowColor = p.color; ctx.beginPath(); ctx.arc(p.pos.x, p.pos.y, p.size/2, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0; }
        }
        ctx.globalCompositeOperation = 'source-over'; ctx.globalAlpha = 1.0; ctx.textAlign = 'center'; ctx.font = 'bold 16px "Segoe UI"';
        for (let t of this.texts) { ctx.globalAlpha = Math.max(0, t.life/t.maxLife); ctx.fillStyle = t.color; ctx.strokeStyle = 'black'; ctx.lineWidth = 2; ctx.strokeText(t.text, t.x, t.y); ctx.fillText(t.text, t.x, t.y); }
        ctx.globalAlpha = 1.0;
    }
}

class WaveManager {
    constructor(game) { this.game = game; this.waveNumber = 0; this.maxWaves = 50; this.isWaveActive = false; this.spawnQueue = []; this.spawnTimer = 0; document.getElementById('ui-max-wave').innerText = this.maxWaves; document.getElementById('btn-start-wave').addEventListener('click', () => this.startNextWave()); }
    generateWave(num) {
        let q = [], hm = 1 + (num * 0.2), gen = (t, c, d) => Array(c).fill().map(()=>({type:t, delay:d, hp:hm}));
        if (num === 1) q = gen('GOBLIN', 10, 1.0);
        else if (num === 2) q = gen('GOBLIN', 15, 0.8);
        else if (num === 3) q = [...gen('GOBLIN', 10, 0.8), ...gen('ORC', 5, 1.5)];
        else if (num % 10 === 0) q = gen('BOSS', Math.floor(num/10), 3.0);
        else { let pts = num * 10, spent = 0; while(spent < pts) { let r = Math.random(); if(r<0.3){q.push({type:'SWARM',delay:0.3,hp:hm});spent+=2;} else if(r<0.6){q.push({type:'GOBLIN',delay:0.8,hp:hm});spent+=5;} else if(r<0.8){q.push({type:'ORC',delay:1.2,hp:hm});spent+=10;} else if(r<0.95){q.push({type:'GHOST',delay:1.0,hp:hm});spent+=15;} else{q.push({type:'TROLL',delay:2.0,hp:hm});spent+=25;} } } return q;
    }
    startNextWave() {
        if (this.isWaveActive || this.waveNumber >= this.maxWaves) return;
        this.waveNumber++; document.getElementById('ui-wave').innerText = this.waveNumber;
        this.spawnQueue = this.generateWave(this.waveNumber); this.isWaveActive = true;
        let b = document.getElementById('btn-start-wave'); b.classList.add('disabled'); b.innerText = 'Wave in Progress';
    }
    update(dt) {
        if (!this.isWaveActive) { if (this.waveNumber > 0 && this.game.enemies.length === 0) { if (this.waveNumber === this.maxWaves) this.game.winGame(); else { let b = document.getElementById('btn-start-wave'); b.classList.remove('disabled'); b.innerText = 'Start Wave ' + (this.waveNumber + 1); } } return; }
        if (this.spawnQueue.length > 0) {
            if ((this.spawnTimer -= dt) <= 0) {
                let s = this.spawnQueue.shift(); this.game.enemies.push(new Enemy(ENEMY_TYPES[s.type], this.game.map.getWaypointPixels(), s.hp));
                if (this.spawnQueue.length > 0) this.spawnTimer = this.spawnQueue[0].delay;
            }
        } else if (this.game.enemies.length === 0) { this.isWaveActive = false; this.game.addMoney(100 + this.waveNumber * 10); }
    }
}

class GameEngine {
    constructor(cid) {

    }
    bindEvents() {

        this.canvas.addEventListener('mousedown', (e) => {
            if(e.button !== 0 || this.isGameOver) return;
            let gx = this.hoveredGrid.x, gy = this.hoveredGrid.y;
            if (gx < 0 || gx >= CONFIG.COLS || gy < 0 || gy >= CONFIG.ROWS) return;
            if (this.selectedBuildType) {
                if (this.map.grid[gx][gy] !== 0) return;
                let c = TOWER_TYPES[this.selectedBuildType].baseCost;
                if (this.money >= c) {
                    this.addMoney(-c); let t = new Tower(gx, gy, this.selectedBuildType); this.towers.push(t); this.map.grid[gx][gy] = 2;
                    for(let i=0; i<10; i++) this.particleSystem.addParticle(t.pos.x, t.pos.y, '#fff', 50, 3);
                    this.updateBuildMenuState(); this.selectedBuildType = null; document.querySelectorAll('.tower-btn').forEach(b => b.classList.remove('selected'));
                }
            } else { let t = this.towers.find(t => t.gridX === gx && t.gridY === gy); if (t) { this.selectedTower = t; this.updateContextPanel(); } else this.deselectTower(); }
        });
        this.canvas.addEventListener('contextmenu', (e) => { e.preventDefault(); this.selectedBuildType = null; document.querySelectorAll('.tower-btn').forEach(b => b.classList.remove('selected')); this.deselectTower(); });
    }
    deselectTower() { this.selectedTower = null; document.getElementById('context-panel').classList.add('hidden'); document.getElementById('context-empty').classList.remove('hidden'); document.getElementById('context-content').classList.add('hidden'); }
    updateContextPanel() {
        if (!this.selectedTower) return;
        let p = document.getElementById('context-panel'), t = this.selectedTower, s = t.getStats();
        document.getElementById('context-empty').classList.add('hidden'); document.getElementById('context-content').classList.remove('hidden'); p.classList.remove('hidden');
        document.getElementById('ctx-title').innerText = t.def.name; document.getElementById('ctx-title').style.color = t.def.color; document.getElementById('ctx-desc').innerText = t.def.desc;
        document.getElementById('ctx-level').innerText = (t.level + 1) + (t.canUpgrade() ? '' : ' (MAX)'); document.getElementById('ctx-dmg').innerText = s.damage + (s.poisonDps ? ` (+${s.poisonDps}ps)` : ''); document.getElementById('ctx-range').innerText = s.range; document.getElementById('ctx-speed').innerText = s.fireRate;
        let bu = document.getElementById('btn-upgrade');
        if (t.canUpgrade()) { let c = t.getUpgradeCost(); bu.classList.remove('hidden'); document.getElementById('ctx-upgrade-cost').innerText = `($${c})`; bu.className = `flex-1 font-bold py-2 px-4 rounded shadow transition text-sm flex flex-col items-center ${this.money >= c ? 'bg-green-600 hover:bg-green-500 text-white' : 'bg-gray-700 text-gray-400 cursor-not-allowed'}`; } else bu.classList.add('hidden');
        document.getElementById('ctx-sell-value').innerText = `(+$${t.getSellValue()})`;
    }
    updateBuildMenuState() { document.querySelectorAll('.tower-btn').forEach(b => { if (this.money < TOWER_TYPES[b.dataset.type].baseCost) b.classList.add('disabled'); else b.classList.remove('disabled'); }); }
    updateHUD() { document.getElementById('ui-money').innerText = Utils.formatMoney(Math.floor(this.money)); document.getElementById('ui-lives').innerText = this.lives; document.getElementById('ui-score').innerText = Utils.formatMoney(this.score); }
    addMoney(amt) { this.money += amt; this.updateHUD(); this.updateBuildMenuState(); if(this.selectedTower) this.updateContextPanel(); }
    addScore(amt) { this.score += amt; this.updateHUD(); }
    loseLife(amt) { this.lives -= amt; this.updateHUD(); if (this.lives <= 0) { this.lives = 0; this.isGameOver = true; document.getElementById('modal-overlay').classList.remove('hidden'); document.getElementById('modal-score').innerText = Utils.formatMoney(this.score); } }
    winGame() { this.isGameOver = true; document.getElementById('modal-overlay').classList.remove('hidden'); document.getElementById('modal-title').innerText = "Victory!"; document.getElementById('modal-title').classList.replace('text-white', 'text-yellow-400'); document.getElementById('modal-msg').innerText = "Realm secured."; document.getElementById('modal-score').innerText = Utils.formatMoney(this.score); }
    loop(ts) {
        requestAnimationFrame((t) => this.loop(t)); if (!this.lastTime) this.lastTime = ts; let dt = Math.min((ts - this.lastTime) / 1000, 0.1); this.lastTime = ts;
        if (this.isPaused || this.isGameOver) return; dt *= this.gameSpeed;
        this.waveManager.update(dt);
        for (let t of this.towers) t.update(dt);
        for (let i = this.projectiles.length-1; i>=0; i--) { let p = this.projectiles[i]; p.update(dt); if (!p.active) this.projectiles.splice(i, 1); }
        for (let i = this.enemies.length-1; i>=0; i--) { let e = this.enemies[i]; e.update(dt); if (!e.active) this.enemies.splice(i, 1); }
        this.particleSystem.update(dt); this.draw();
    }
    draw() {
        this.map.draw(this.ctx);
        for (let t of this.towers) t.draw(this.ctx);
        for (let e of this.enemies) e.draw(this.ctx);
        for (let p of this.projectiles) p.draw(this.ctx);
        this.particleSystem.draw(this.ctx);
        if (this.selectedBuildType && this.hoveredGrid.x >= 0 && this.hoveredGrid.y >= 0) {
            let hx = this.hoveredGrid.x, hy = this.hoveredGrid.y, td = TOWER_TYPES[this.selectedBuildType], px = hx*CONFIG.GRID_SIZE, py = hy*CONFIG.GRID_SIZE, cx = px+CONFIG.GRID_SIZE/2, cy = py+CONFIG.GRID_SIZE/2;
            Utils.drawCircle(this.ctx, cx, cy, td.upgrades[0].range, CONFIG.COLORS.range, true); Utils.drawCircle(this.ctx, cx, cy, td.upgrades[0].range, td.color, false);
            this.ctx.fillStyle = this.map.grid[hx][hy] === 0 ? 'rgba(0, 255, 0, 0.4)' : 'rgba(255, 0, 0, 0.4)'; this.ctx.fillRect(px, py, CONFIG.GRID_SIZE, CONFIG.GRID_SIZE);
        }
        if (this.selectedTower) {
            let t = this.selectedTower, s = t.getStats();
            Utils.drawCircle(this.ctx, t.pos.x, t.pos.y, s.range, CONFIG.COLORS.range, true); Utils.drawCircle(this.ctx, t.pos.x, t.pos.y, s.range, '#fff', false);
            this.ctx.strokeStyle = '#fff'; this.ctx.lineWidth = 2; this.ctx.strokeRect(t.gridX*CONFIG.GRID_SIZE, t.gridY*CONFIG.GRID_SIZE, CONFIG.GRID_SIZE, CONFIG.GRID_SIZE);
        }
    }
}
window.onload = () => window.game = new GameEngine('gameCanvas');
</script>
